services:
  anythingllm:
    image: mintplexlabs/anythingllm
    container_name: npht-anythingllm
    cap_add:
      - SYS_ADMIN
    ports:
      - "3001:3001"
    env_file:
      - setup/.env
    volumes:
      - npht-anythingllm_storage:/app/server/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/api/ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  nginx:
    container_name: npht-frontend
    image: nginx:alpine
    ports:
      - "3002:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - anythingllm
    restart: unless-stopped

  setup:
    container_name: npht-setup
    build: ./setup
    env_file:
      - setup/.env
    volumes:
      - ./data:/data:ro
      - ./anythingllm/config:/config:ro
      - ./frontend:/frontend
    depends_on:
      anythingllm:
        condition: service_healthy
    restart: "no"

volumes:
  npht-anythingllm_storage:
