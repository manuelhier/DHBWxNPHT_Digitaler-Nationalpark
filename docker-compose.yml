services:
  ollama:
    image: ollama/ollama
    container_name: npht-ollama
    profiles: [local-inference]
    volumes:
      - npht-ollama_models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  anythingllm:
    image: mintplexlabs/anythingllm
    container_name: npht-anythingllm
    cap_add:
      - SYS_ADMIN
    env_file:
      - .env
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - npht-anythingllm_storage:/app/server/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/api/ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    container_name: npht-frontend
    build: ./frontend
    ports:
      - "80:80"
    volumes:
      - npht-config:/run/config:ro
    depends_on:
      anythingllm:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    restart: unless-stopped

  setup:
    container_name: npht-setup
    build: ./setup
    env_file:
      - .env
    volumes:
      - ./anythingllm/data:/data:ro
      - ./anythingllm/config:/config:ro
      - npht-config:/run/config
    depends_on:
      anythingllm:
        condition: service_healthy
    restart: "no"

volumes:
  npht-anythingllm_storage:
  npht-ollama_models:
  npht-config:
