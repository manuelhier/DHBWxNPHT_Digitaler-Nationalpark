services:
  ollama:
    image: ollama/ollama
    container_name: npht-ollama
    profiles: [local-inference]
    volumes:
      - npht-ollama_models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  anythingllm:
    image: mintplexlabs/anythingllm
    container_name: npht-anythingllm
    cap_add:
      - SYS_ADMIN
    env_file:
      - .env
    volumes:
      - npht-anythingllm_storage:/app/server/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/api/ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  nginx:
    container_name: npht-frontend
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
      - "3001:3001"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/certs:/etc/nginx/certs:ro
    depends_on:
      - anythingllm
    restart: unless-stopped

  setup:
    container_name: npht-setup
    build: ./setup
    env_file:
      - .env
    volumes:
      - ./anythingllm/data:/data:ro
      - ./anythingllm/config:/config:ro
      - ./frontend:/frontend
    depends_on:
      anythingllm:
        condition: service_healthy
    restart: "no"

volumes:
  npht-anythingllm_storage:
  npht-ollama_models:
