server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location = /anythingllm-slug.json {
        alias /run/config/anythingllm-slug.json;
    }

    location /api/ {
        proxy_pass http://anythingllm:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        include /run/config/anythingllm-auth.conf;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /embed/ {
        proxy_pass http://anythingllm:3001/embed/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
