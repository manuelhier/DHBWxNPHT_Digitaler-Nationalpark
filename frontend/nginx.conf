server {
    listen 80;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;

    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Serve frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Proxy API calls to AnythingLLM
    location /api/ {
        proxy_pass http://anythingllm:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # SSE support for streaming chat responses
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Proxy embed widget script from AnythingLLM
    location /embed/ {
        proxy_pass http://anythingllm:3001/embed/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
