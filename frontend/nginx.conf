server {
    listen 80;
    return 301 https://$host$request_uri;
}

# npht.dh-karlsruhe.de — redirect to demo
server {
    listen 443 ssl;
    server_name npht.dh-karlsruhe.de;

    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    return 301 https://demo.npht.dh-karlsruhe.de$request_uri;
}

# demo.npht.dh-karlsruhe.de — chat frontend
server {
    listen 443 ssl;
    server_name demo.npht.dh-karlsruhe.de;

    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /api/ {
        proxy_pass http://anythingllm:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location /embed/ {
        proxy_pass http://anythingllm:3001/embed/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# admin.npht.dh-karlsruhe.de — AnythingLLM admin UI
server {
    listen 443 ssl;
    server_name admin.npht.dh-karlsruhe.de;

    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    location / {
        proxy_pass http://anythingllm:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
